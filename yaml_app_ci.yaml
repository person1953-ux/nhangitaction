name: Application CI/CD (Ubuntu + Flake8 + Event-driven)

on:
  pull_request:
    paths-ignore:
      - "sql/**"
      - "plsql/**"

  push:
    branches: [ main ]
    paths-ignore:
      - "sql/**"
      - "plsql/**"

jobs:

  # ---------------------------
  # 1️⃣ CI JOB (Pull Request)
  # ---------------------------
  ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    services:
      # Start a local Kafka broker for integration tests
      kafka:
        image: bitnami/kafka:latest
        ports:
          - 9092:9092
        options: >-
          --health-cmd "echo > /dev/null"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Optional environment variables for event-driven tests
      KAFKA_BOOTSTRAP: localhost:9092
      PUBSUB_EMULATOR_HOST: localhost:8085
      SALESFORCE_TEST_USER: ${{ secrets.SF_TEST_USER }}
      SALESFORCE_TEST_PASS: ${{ secrets.SF_TEST_PASS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest kafka-python google-cloud-pubsub simple-salesforce

      - name: Run Flake8 Linter
        run: flake8 .

      - name: Run Unit Tests
        run: pytest tests/unit/

      - name: Run Event-driven Integration Tests
        run: pytest tests/integration/

      - name: Validate Event Schemas
        run: python tests/schema_validation.py

  # ---------------------------
  # 2️⃣ Deploy to STAGING
  # ---------------------------
  deploy-staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: ci
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy application to STAGING
        run: |
          echo "Deploying app to STAGING server..."
          # Example: SSH deploy to staging
          # ssh deploy@staging-server "bash deploy.sh"

  # ---------------------------
  # 3️⃣ Deploy to PRODUCTION
  # ---------------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy application to PRODUCTION
        run: |
          echo "Deploying app to PRODUCTION server..."
          # Example: SSH deploy to production
          # ssh deploy@prod-server "bash deploy.sh"


          
