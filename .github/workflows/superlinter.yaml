name: Super-Linter

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    name: Lint (Super-Linter)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Super-Linter
        uses: super-linter/super-linter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          LOG_LEVEL: INFO
          FILTER_REGEX_EXCLUDE: (data/.*)          
          RUN_PYTHON_BLACK: false
          RUN_PYTHON_PYLINT: false
          RUN_PYTHON_FLAKE8: false
          RUN_PYTHON_ISORT: false

