name: CI Pipeline - DB Governance

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:

  lint:
    name: Code Lint (YAML / Markdown / Actions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Super-Linter
        uses: super-linter/super-linter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          LOG_LEVEL: INFO

          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_YAML: true
          VALIDATE_MARKDOWN: true

          # SQL linting via SQLFluff
          VALIDATE_SQLFLUFF: true

  db-check:
    name: SQL Governance + Dependency Check
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_db
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          pip install sqlfluff

      # -----------------------------
      # Load schema into Postgres
      # -----------------------------
      - name: Load schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 5433 -U postgres -d app_db -f sql/schema.sql

      # -----------------------------
      # Run SQLFluff (style + safety)
      # -----------------------------
      - name: SQLFluff Lint
        run: sqlfluff lint sql/

      # -----------------------------
      # SQL GOVERNANCE TESTS (YOUR REQUIREMENT)
      # -----------------------------
      - name: Run SQL Safety Tests
        env:
          PGPASSWORD: postgres
        run: |

          echo "Running SQL safety tests..."

          # -----------------------------
          # TEST 1: TRUNCATE TABLE (MUST FAIL)
          # -----------------------------
          echo "TEST 1: TRUNCATE TABLE"
          if grep -Ri "TRUNCATE" sql/; then
            echo "❌ TRUNCATE TABLE is NOT allowed"
            exit 1
          fi

          # -----------------------------
          # TEST 2: SELECT * (MUST FAIL)
          # -----------------------------
          echo "TEST 2: SELECT *"
          if grep -RiE "SELECT \*" sql/; then
            echo "❌ SELECT * is NOT allowed (performance risk)"
            exit 1
          fi

          echo "✅ SQL Governance Passed"

      # -----------------------------
      # OPTIONAL: Validate DB objects exist
      # -----------------------------
      - name: Validate DB state
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 5433 -U postgres -d app_db -c "\dt"