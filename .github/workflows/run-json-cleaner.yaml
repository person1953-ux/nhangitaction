name: Run JSON cleaner

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  run-cleaner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run cleaner on sample input
        run: |
          python scripts/clean_json.py data/messy.json /tmp/clean.json --pretty


  